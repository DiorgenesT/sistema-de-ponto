name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---- Backend ---------------------------------------------------------------
  backend:
    name: Backend — lint, type-check, tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: Mypy type-check
        working-directory: backend
        run: uv run mypy app/

      - name: Unit tests
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          FACIAL_ENCRYPTION_KEY: ${{ secrets.FACIAL_ENCRYPTION_KEY }}
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest tests/unit/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml

  # ---- Frontend --------------------------------------------------------------
  frontend:
    name: Frontend — lint, type-check, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        working-directory: frontend
        run: pnpm type-check

      - name: ESLint
        working-directory: frontend
        run: pnpm lint

      - name: Unit tests
        working-directory: frontend
        run: pnpm test:coverage

      - name: Build
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.API_URL }}
        run: pnpm build
